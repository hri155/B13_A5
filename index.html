<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
   
</head>
<body class="min-h-screen flex justify-center m-auto">
       <div class="card bg-white p-32 rounded-lg shadow-md">
       <div class="card-body items-center text-center">
        <img src="./assets/github-logo.png" alt="github-logo" class="mb-6 w-40 max-w-xs"> 
         <h2 class="card-title text-xl">GitHub Issues Tracker</h2>
         <p class="text-sm text-gray-500 mb-4"> Sign in to manage your issues</p>
         </div>

         <div class="w-full">
            <label class="label">
               <span class="label-text text-black font-medium mb-2"> Username</span>
            </label>
            <input type="text" class="input validator" required placeholder="Enter Username" 
            pattern="[A-Za-z][A-Za-z0-9\-]*" minlength="3" maxlength="30" title="Only letters, numbers or dash" />
            <p class="text-[#4A00FF] mt-2">Default: admin</p>
         </div>
         <div class="w-full">
             <label class="label">
               <span class="label-text text-black font-medium mb-2">Password</span>
            </label>
            <input type="password" class="input validator" required placeholder="Enter Password" minlength="8" 
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
            title="Must be more than 8 characters, including number, lowercase letter, uppercase letter" />
            <p class="text-[#4A00FF] mt-2">Default:admin123</p>
         </div>
         <div class="w-full bg-[#4A00FF] p-3 rounded-md text-center mt-2">
            <button class="text-white">Sign In</button>
        </div>
        <div class="text-center mt-4"> <h3>OR</h3></div>
        <div class="text-center mt-2">
            <p class="text-gray-500 text-center mb-6">Demo Credentials</p>
            <h3><span class="text-black font-medium"> Username:</span> admin</h3>
            <h3><span class="text-black font-medium">Passwoed:</span> admin123</h3>
        </div>
          
       </div>
    
</body>
</html>
