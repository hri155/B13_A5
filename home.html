<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
     crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>

<header class="bg-white border-b border-gray-200 px-4 sm:px-8 py-4 flex items-center justify-between">

  <div class="flex items-center gap-3">
    <img src="./assets/github-logo.png" alt="github logo" class="w-7 h-7 sm:w-8 sm:h-8">
    <h1 class="text-lg sm:text-xl font-semibold">GitHub Issues Tracker</h1>
  </div>

  <div class="flex items-center justify-between gap-2 sm:gap-3">
  <div class="flex items-center gap-2 sm:gap-3 w-full sm:w-auto">
    <button onclick="toggleSearch()" class="sm:hidden p-2 rounded-lg hover:bg-gray-100">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <div id="mobileSearch" class="relative hidden w-full sm:block sm:w-auto">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
      <input
        type="text"
        placeholder="Search issues..."
        class="w-full sm:w-72 rounded-lg bg-gray-50 pl-10 pr-3 py-2 text-sm outline-none focus:ring-2 focus:ring-violet-500"
      />
    </div>
  </div>

  <button class="w-full sm:w-auto rounded-lg bg-[#4A00FF] px-3 sm:px-4 py-2 text-sm font-medium text-white hover:bg-violet-700">
    + New Issue
  </button>
</div>

</header>
<main class="bg-[#f8fafcf4] py-6">
  <div class="max-w-5xl mx-auto">
    
    <div class="bg-white p-4 shadow-lg rounded-lg flex gap-4">
      <button class="bg-[#4A00FF] text-white rounded-md px-4 py-1">All</button>
      <button class="bg-gray-100 rounded-md px-4 py-1">Open</button>
      <button class="bg-gray-100 rounded-md px-4 py-1">Close</button>
    </div>

  </div>
</main>

<section class="all_issues bg-[#f8fafcf4] py-6 ">
    <div class="flex items-center justify-between px-4 py-3 max-w-5xl mx-auto shadow-lg rounded-lg bg-white">
  <div class="flex items-center gap-3">
    <div class="flex h-9 w-9 items-center justify-center rounded-full bg-violet-100">
     <img src="./assets/Aperture.png" alt="" class="w-6">
    </div>

    <div>
      <h2 class="text-lg font-semibold leading-none">50 Issues</h2>
      <p class="mt-1 text-sm text-gray-500">Track and manage your project issues</p>
    </div>
  </div>

  <div class="flex items-center gap-5 text-sm text-gray-700">
    <div class="flex items-center gap-2">
      <span class="h-2.5 w-2.5 rounded-full bg-green-500"></span>
      <span>Open</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="h-2.5 w-2.5 rounded-full bg-violet-400"></span>
      <span>Closed</span>
    </div>
  </div>
</div>

</section>

<script>
function toggleSearch() {
  const search = document.getElementById("mobileSearch");
  search.classList.toggle("hidden");
}
</script>

</body>
</html>
