<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<header class="bg-white border-b border-gray-200 px-4 sm:px-8 py-4 flex items-center justify-between">

  <div class="flex items-center gap-3">
    <img src="./assets/github-logo.png" alt="github logo" class="w-7 h-7 sm:w-8 sm:h-8">
    <h1 class="text-lg sm:text-xl font-semibold">GitHub Issues Tracker</h1>
  </div>

  <div class="flex items-center gap-2 sm:gap-3">

    <button class="sm:hidden p-2 rounded-lg hover:bg-gray-100">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <div class="relative hidden sm:block">
      <input
        type="text"
        placeholder="Search issues..."
        class="w-72 rounded-lg bg-gray-50 px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-violet-500"
      />
    </div>

    <button class="rounded-lg bg-[#4A00FF] px-3 sm:px-4 py-2 text-sm font-medium text-white hover:bg-violet-700">
      + New Issue
    </button>
  </div>

</header>
<main class="bg-[#F8FAFC] gap-2">
    <div class="card bg-white w-full p-4 shadow-lg rounded-lg flex gap-6">
        <button class="bg-[#4A00FF]">All</button>
         <button class="bg-gray-100">Open</button>
         <button class="bg-gray-100">Close</button>
    </div>
</main>

</body>
</html>
